<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;display:flex;flex-direction:column;height:100%;min-height:410px;background:var(--surface);border:1.5px solid {{ borderColor }};border-radius:18px;overflow:hidden;transition:transform .16s,box-shadow .16s" style-hover="transform:translateY(-3px);box-shadow:0 16px 34px -20px rgba(0,0,0,.45)">

  <button onClick="{{ go }}" title="{{ openTitle }}" style="position:relative;display:block;width:100%;flex:1 1 auto;min-height:305px;padding:0;border:0;cursor:pointer;background:var(--surface2);overflow:hidden">
    <sc-if value="{{ hasImage }}" hint-placeholder-val="{{ false }}">
      <img src="{{ image }}" alt="{{ title }}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center"/>
    </sc-if>
    <sc-if value="{{ noImage }}" hint-placeholder-val="{{ true }}">
      <span style="position:absolute;inset:0;background:repeating-linear-gradient(135deg,var(--surface2),var(--surface2) 9px,var(--line) 9px,var(--line) 10px)"></span>
      <span style="position:absolute;top:12px;left:12px;font-family:ui-monospace,monospace;font-size:10px;color:var(--soft);background:var(--surface);padding:3px 7px;border-radius:6px">{{ cover }}</span>
    </sc-if>
    <span style="position:absolute;left:0;top:0;bottom:0;width:4px;background:{{ accentStrip }}"></span>
    <span style="position:absolute;left:0;right:0;bottom:0;display:block;padding:34px 14px 13px;text-align:left;background:linear-gradient(to top,rgba(0,0,0,.82),rgba(0,0,0,.4) 55%,rgba(0,0,0,0));font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17.5px;line-height:1.18;letter-spacing:-.01em;color:#fff;text-wrap:pretty">{{ title }}</span>
  </button>

  <sc-if value="{{ provTop }}" hint-placeholder-val="{{ false }}">
  <button onClick="{{ prov.go }}" title="{{ prov.title }}" style="position:absolute;top:11px;right:11px;z-index:4;display:flex;align-items:center;gap:6px;max-width:84%;padding:4px 10px 4px 4px;border-radius:999px;background:{{ prov.bg }};color:{{ prov.fg }};font-size:11.5px;font-weight:600;box-shadow:0 2px 9px -3px rgba(0,0,0,.5)" style-hover="opacity:.85"><span style="width:20px;height:20px;border-radius:{{ prov.avRadius }};background:var(--surface);color:{{ prov.fg }};display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;flex-shrink:0">{{ prov.init }}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ prov.verb }} {{ prov.name }}</span></button>
  </sc-if>

  <sc-if value="{{ tagsOpen }}" hint-placeholder-val="{{ false }}">
  <div style="display:flex;gap:6px;flex-wrap:wrap;padding:11px 13px 0">
    <sc-for list="{{ tagObjs }}" as="t" hint-placeholder-count="2"><button onClick="{{ t.click }}" title="Filtra per #{{ t.tag }}" style="font-size:12px;color:var(--soft);background:var(--surface2);padding:3px 9px;border-radius:7px;transition:background .12s,color .12s" style-hover="background:var(--primary);color:#fff">#{{ t.tag }}</button></sc-for>
  </div>
  </sc-if>

  <sc-if value="{{ detailsOpen }}" hint-placeholder-val="{{ false }}">
  <div style="position:absolute;left:0;right:0;top:0;bottom:52px;z-index:3;background:color-mix(in srgb,var(--surface) 94%,transparent);backdrop-filter:blur(3px);border-left:4px solid {{ accentStrip }};padding:16px 16px 14px;overflow:auto;display:flex;flex-direction:column;gap:9px;animation:l2mCardInfo .2s ease both">
    <button onClick="{{ go }}" title="{{ openTitle }}" style="margin:0;text-align:left;background:none;padding:0;cursor:pointer;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:17px;line-height:1.18;letter-spacing:-.01em;color:var(--ink)" style-hover="color:var(--primary)">{{ title }}</button>
    <button onClick="{{ openOwner }}" title="{{ ownerTitle }}" style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--soft);background:none;padding:0;cursor:pointer;text-align:left" style-hover="color:var(--ink)"><span style="width:22px;height:22px;border-radius:50%;background:var(--violetSoft);color:var(--violet);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">{{ ownerInit }}</span><span>di {{ owner }}</span></button>
    <sc-if value="{{ prov.show }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ prov.go }}" title="{{ prov.title }}" style="display:inline-flex;align-items:center;gap:7px;align-self:flex-start;padding:4px 11px 4px 4px;border-radius:999px;background:{{ prov.bg }};color:{{ prov.fg }};font-size:12px;font-weight:600;cursor:pointer" style-hover="opacity:.85"><span style="width:20px;height:20px;border-radius:{{ prov.avRadius }};background:var(--surface);color:{{ prov.fg }};display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;flex-shrink:0">{{ prov.init }}</span>{{ prov.verb }} {{ prov.name }}</button>
    </sc-if>
    <sc-if value="{{ hasReason }}" hint-placeholder-val="{{ false }}"><p style="margin:0;color:var(--violet);font-size:12.5px;font-weight:500;line-height:1.4">{{ reason }}</p></sc-if>
    <sc-if value="{{ hasDesc }}" hint-placeholder-val="{{ false }}"><p style="margin:0;color:var(--ink);font-size:13px;line-height:1.5">{{ desc }}</p></sc-if>
    <sc-if value="{{ hasTypes }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <sc-for list="{{ typeObjs }}" as="ty" hint-placeholder-count="3"><button onClick="{{ ty.click }}" title="{{ ty.count }} {{ ty.label }}" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--ink);background:var(--surface2);padding:4px 9px;border-radius:8px;cursor:pointer" style-hover="background:var(--primarySoft);color:var(--primary)"><span style="display:flex;color:{{ ty.color }}">{{ ty.icon }}</span>{{ ty.count }}<span style="color:var(--soft);font-weight:500">{{ ty.label }}</span></button></sc-for>
    </div>
    </sc-if>
    <sc-if value="{{ hasTags }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <sc-for list="{{ tagObjs }}" as="t" hint-placeholder-count="2"><button onClick="{{ t.click }}" title="Filtra per #{{ t.tag }}" style="font-size:12px;color:var(--soft);background:var(--surface2);padding:3px 9px;border-radius:7px" style-hover="background:var(--primary);color:#fff">#{{ t.tag }}</button></sc-for>
    </div>
    </sc-if>
    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:auto;padding-top:9px;border-top:1px solid var(--line);font-size:12.5px;color:var(--soft)">
      <span><strong style="color:var(--ink);font-weight:700">{{ count }}</strong> elementi</span>
      <span><strong style="color:var(--ink);font-weight:700">{{ tagCount }}</strong> tag</span>
      <sc-if value="{{ hasFollowers }}" hint-placeholder-val="{{ false }}"><span><strong style="color:var(--ink);font-weight:700">{{ followers }}</strong> follower</span></sc-if>
      <span><strong style="color:var(--ink);font-weight:700">{{ score }}</strong> voti</span>
    </div>
    <sc-if value="{{ hasManage }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:9px;border-top:1px solid var(--line)">
      <sc-if value="{{ canArchive }}" hint-placeholder-val="{{ false }}"><button onClick="{{ toggleArchive }}" title="{{ archiveTitle }}" style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:{{ archiveColor }};background:var(--surface2)" style-hover="color:var(--violet);background:var(--violetSoft)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></button></sc-if>
      <sc-if value="{{ canDelete }}" hint-placeholder-val="{{ false }}"><button onClick="{{ del }}" title="Elimina la lista" style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--soft);background:var(--surface2)" style-hover="color:var(--primary);background:var(--primarySoft)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button></sc-if>
    </div>
    </sc-if>
  </div>
  </sc-if>

  <div style="position:relative;z-index:4;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:11px 13px;margin-top:auto">
    <button onClick="{{ openOwner }}" title="{{ ownerTitle }}" style="width:26px;height:26px;border-radius:50%;background:var(--violetSoft);color:var(--violet);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;padding:0" style-hover="opacity:.72">{{ ownerInit }}</button>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto">
      <span title="{{ followerCount }} follower" style="display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--surface2);padding:4px 8px;border-radius:999px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>{{ followerCount }}</span>
      <sc-if value="{{ hasTags }}" hint-placeholder-val="{{ true }}"><button onClick="{{ toggleTags }}" title="{{ tagCount }} tag" style="display:inline-flex;align-items:center;gap:3px;font-size:12.5px;font-weight:700;padding:4px 9px;border-radius:999px;background:{{ tagChipBg }};color:{{ tagChipFg }};transition:background .14s,color .14s">{{ tagLabel }}</button></sc-if>
      <sc-if value="{{ showVote }}" hint-placeholder-val="{{ false }}">
      <div style="display:inline-flex;align-items:center;gap:2px;background:var(--surface2);border-radius:999px;padding:2px 3px" title="Vota la lista">
        <button onClick="{{ onUpvote }}" title="Vota positivamente" style="width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:{{ upColor }}" style-hover="color:#e0245e"><svg viewBox="0 0 24 24" fill="{{ upFill }}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>
        <span style="font-weight:700;font-size:12px;min-width:16px;text-align:center;color:var(--ink)">{{ score }}</span>
        <button onClick="{{ onDownvote }}" title="Vota negativamente" style="width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:{{ downColor }}" style-hover="color:var(--violet)"><svg viewBox="0 0 24 24" fill="{{ downFill }}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/><path d="M12.5 7l-2 3.6h3L11 15"/></svg></button>
      </div>
      </sc-if>
      <sc-if value="{{ showFav }}" hint-placeholder-val="{{ false }}"><button onClick="{{ toggleFav }}" title="{{ favTitle }}" style="width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:{{ favColor }};background:var(--surface2)" style-hover="color:var(--gold)"><svg viewBox="0 0 24 24" fill="{{ favFill }}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polygon points="12 2 15.1 8.6 22 9.3 17 14.1 18.2 21 12 17.6 5.8 21 7 14.1 2 9.3 8.9 8.6 12 2"/></svg></button></sc-if>
      <button onClick="{{ toggleDetails }}" title="{{ detailsTitle }}" style="width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:{{ arrowColor }};background:var(--surface2);transition:transform .16s;transform:rotate({{ arrowRot }})" style-hover="color:var(--primary)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="18 15 12 9 6 15"/></svg></button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:430},&quot;card&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;}}">
class Component extends DCLogic {
  state = { tagsOpen: false, detailsOpen: false };
  renderVals() {
    const c = this.props.card || {};
    const tags = c.tags || [];
    const onTag = c.onTag;
    const to = this.state.tagsOpen, do_ = this.state.detailsOpen;
    return {
      go: c.go || (() => {}),
      openTitle: c.title ? ('Apri “' + c.title + '”') : 'Apri la lista',
      title: c.title || '',
      cover: c.cover || 'copertina',
      image: c.image || '',
      hasImage: !!c.image, noImage: !c.image,
      borderColor: c.accent || 'var(--line)',
      accentStrip: c.accent || 'var(--primary)',
      owner: c.owner || '', ownerInit: c.ownerInit || '',
      prov: c.prov || { show: false, verb: '', name: '', init: '', avRadius: '50%', go: () => {}, title: '', bg: '', fg: '' },
      provTop: !!(c.prov && c.prov.show) && !this.state.detailsOpen,
      openOwner: c.openOwner || (() => {}), ownerTitle: c.ownerTitle || '',
      count: (c.count != null ? c.count : 0),
      tagCount: tags.length, tagLabel: '#' + tags.length, hasTags: tags.length > 0,
      tagObjs: tags.map(t => ({ tag: t, click: () => onTag && onTag(t) })),
      typeObjs: (c.types || []).map(t => ({ label: t.label, count: t.count, color: t.color, icon: t.icon, click: c.go || (() => {}) })),
      hasTypes: (c.types || []).length > 0,
      tagsOpen: to, toggleTags: () => this.setState(s => ({ tagsOpen: !s.tagsOpen })),
      tagChipBg: to ? 'var(--primary)' : 'var(--surface2)',
      tagChipFg: to ? '#fff' : 'var(--ink)',
      detailsOpen: do_, toggleDetails: () => this.setState(s => ({ detailsOpen: !s.detailsOpen })),
      detailsTitle: do_ ? 'Nascondi dettagli' : 'Mostra tutte le informazioni',
      arrowRot: do_ ? '180deg' : '0deg',
      arrowColor: do_ ? 'var(--primary)' : 'var(--soft)',
      reason: c.reason || '', hasReason: !!c.reason,
      desc: c.desc || '', hasDesc: !!c.desc,
      followers: (c.followers != null ? c.followers : ''), hasFollowers: c.followers != null && c.followers !== '',
      followerCount: (c.followers != null && c.followers !== '' ? c.followers : 0),
      showVote: (c.score != null || !!c.onUpvote),
      score: (c.score != null ? c.score : 0),
      onUpvote: c.onUpvote || (() => {}),
      onDownvote: c.onDownvote || (() => {}),
      upColor: c.upvoted ? '#e0245e' : 'var(--soft)',
      upFill: c.upvoted ? '#e0245e' : 'none',
      downColor: c.downvoted ? 'var(--violet)' : 'var(--soft)',
      downFill: c.downvoted ? 'var(--violet)' : 'none',
      showFav: !!c.toggleFav,
      toggleFav: c.toggleFav || (() => {}),
      favTitle: c.favTitle || (c.isFav ? 'Rimuovi dai preferiti' : 'Aggiungi ai preferiti'),
      favColor: c.isFav ? 'var(--gold)' : 'var(--soft)',
      favFill: c.isFav ? 'var(--gold)' : 'none',
      canArchive: !!c.toggleArchive,
      toggleArchive: c.toggleArchive || (() => {}),
      archiveTitle: c.isArch ? 'Ripristina la lista' : 'Archivia la lista',
      archiveColor: c.isArch ? 'var(--gold)' : 'var(--soft)',
      canDelete: !!c.del && !!c.isMine,
      del: c.del || (() => {}),
      hasManage: !!c.toggleArchive || (!!c.del && !!c.isMine)
    };
  }
}
</script>
</body>
</html>
